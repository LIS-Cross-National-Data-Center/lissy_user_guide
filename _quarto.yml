project:
  type: website
  output-dir: _site

website:
  title: "LISSY User Guide"
  favicon: images/main.jpg
  bread-crumbs: false
  page-navigation: true

  page-footer:
    left: |
      &copy; Luxembourg Income Study
    right: |
      This site is built with ❤️ and <a href="https://quarto.org/">Quarto</a>.  
      Inspired by R4DS and NASA Openscapes.

  # ✅ TOP NAVBAR
  navbar:
    left:
      - text: "Getting Started"
        href: getting-started/index.qmd
      - text: "R Users"
        href: r-users/index.qmd
      - text: "Stata Users"
        href: stata-users/index.qmd
      - text: "FAQs"
        href: faqs/index.qmd

  # ✅ SIDEBAR (contextual, appears on pages)
  sidebar:

    # -------------------------
    # Getting Started Sidebar
    # -------------------------
    - id: getting-started
      title: "Getting Started"
      collapse-level: 1
      contents:
        - text: "Overview"
          href: getting-started/index.qmd
        - text: "Installation"
          href: getting-started/installation.qmd
        - text: "First Steps"
          href: getting-started/first-steps.qmd

    # -------------------------
    # R Users Sidebar
    # -------------------------
    - id: r-users
      title: "R Users"
      contents:
        - text: "Overview"
          href: r-users/index.qmd
        - section: "Import Data"
          collapsed: true          # 👈 add this
          contents: 
            - text: "Method 1: lissyuse"
              href: r-users/method1.qmd 
            - text: "Method 2: read.LIS()"
              href: r-users/method2.qmd
            - text: "Country Codes and Variables"
              href: r-users/ccyy_vars.qmd 
            - text: "Bonus: lists over data.frames ?"
              href: r-users/lists_over_df.qmd
        - section: "Describing Data"
          contents: 
            - text: "Categorical Variables"
              href: r-users/dd_catg_vars.qmd 
            - text: "Continuous Variables"
              href: r-users/dd_cont_vars.qmd
        - section: "Data Handling"
          contents: 
            - text: "Categorical Variables"
              href: r-users/dh_catg_vars.qmd 
            - text: "Continuous Variables"
              href: r-users/dh_cont_vars.qmd  
        - section: "Aggregate Figures"
          contents: 
            - text: "run_weighted functions"
              href: r-users/rwf.qmd 
            - text: "Tidy up results"
              href: r-users/tidy_structure_to_plot.qmd
            - text: "Export to csv"
              href: r-users/exp_to_csv.qmd 
            - text: "Plots in LISSY"
              href: r-users/plots.qmd
        - section: "Best Practises"
          contents: 
            - text: "Best Practises"
              href: r-users/bp.qmd                           


              

    # -------------------------
    # Stata Users Sidebar
    # -------------------------
    - id: stata-users
      title: "Stata Users"
      contents:
        - text: "Overview"
          href: stata-users/index.qmd
        - section: "Data Handling"
          contents: 
            - text: "Import Data"
              href: stata-users/import-data.qmd
            - text: "Prepare Data"
              href: stata-users/prepare-data.qmd
            - text: "Explore Data"
              href: stata-users/explore-data.qmd  

    # -------------------------
    # FAQs Sidebar
    # -------------------------
    - id: faqs
      title: "FAQs"
      contents:
        - text: "Common Questions"
          href: faqs/index.qmd


format:
  html:
    theme: [cosmo, custom.scss]
    css: styles.css

    toc: true
    toc-title: "On this page"
    toc-location: right

    code-link: true
    callout-appearance: simple
    include-after-body:
      - text: |
          <script src="/assets/foldable.js"></script>

editor: source

