project:
  type: website
  output-dir: _site

website:
  title: "LISSY User Guide"
  favicon: images/main.jpg
  bread-crumbs: false
  page-navigation: true

  page-footer:
    left: |
      &copy; Luxembourg Income Study, 2026
    right: |
      This website was built using <a href="https://quarto.org/">Quarto</a>. 

  # ✅ TOP NAVBAR
  navbar:
    left:
      - text: "Getting Started"
        href: getting-started/index.qmd
      - text: "R Users"
        href: r-users/index.qmd
      - text: "Stata Users"
        href: stata-users/index.qmd
      - text: "Other Resources"
        href: other-resources/index.qmd
      - text: "FAQs"
        href: faqs/index.qmd


  # ✅ SIDEBAR (contextual, appears on pages)
  sidebar:

    # -------------------------
    # Getting Started Sidebar
    # -------------------------
    - id: getting-started
      title: "Getting Started"
      collapse-level: 1
      contents:
        - text: "Overview"
          href: getting-started/index.qmd
        - text: "Registration"
          href: getting-started/registration.qmd
        - text: "Submit First Job"
          href: getting-started/submit_first_job.qmd
        - text: "Best Practises"
          href: getting-started/bp.qmd
        - text: "SAS and SPSS Users"
          href: getting-started/sas_spss.qmd


    # -------------------------
    # R Users Sidebar
    # -------------------------
    - id: r-users
      title: "R Users"
      contents:
        - text: "Overview"
          href: r-users/index.qmd
        - section: "Import Data"
          collapsed: true          # 👈 add this
          contents: 
            - text: "Method 1: lissyuse"
              href: r-users/method1.qmd 
            - text: "Method 2: read.LIS()"
              href: r-users/method2.qmd
            - text: "Country Codes and Variables"
              href: r-users/ccyy_vars.qmd 
            - text: "Bonus: lists over data.frames ?"
              href: r-users/lists_over_df.qmd
        - section: "Describing Data"
          contents: 
            - text: "Categorical Variables"
              href: r-users/dd_catg_vars.qmd 
            - text: "Continuous Variables"
              href: r-users/dd_cont_vars.qmd
        - section: "Data Handling"
          contents: 
            - text: "Recoding Categories"
              href: r-users/dh_catg_vars.qmd 
            - text: "Preparing Income Variables"
              href: r-users/dh_inc_prep.qmd  
            - text: "Currency and Price Level Adjustments"
              href: r-users/dh_ppp.qmd              
        - section: "Structuring Results for Analysis"
          contents: 
            - text: "structure_to_plot()"
              href: r-users/tidy_structure_to_plot.qmd
            - text: "Export to CSV"
              href: r-users/tidy_exp_to_csv.qmd 
            - text: "Plotting in LISSY"
              href: r-users/tidy_plots.qmd                     


              

    # -------------------------
    # Stata Users Sidebar
    # -------------------------
    - id: stata-users
      title: "Stata Users"
      contents:
        - text: "Overview"
          href: stata-users/index.qmd
        - section: "Import Data"
          collapsed: true          # 👈 add this
          contents: 
            - text: "Method 1: lissyuse"
              href: stata-users/method1.qmd
            - text: "Method 2: use"
              href: stata-users/method2.qmd
            - text: "Datasets and Variables"
              href: stata-users/datasets_and_vars.qmd

        - section: "Describing Data"
          contents:
            - text: "Categorical Variables"
              href: stata-users/dd_catg_vars.qmd
            - text: "Continuous Variables"
              href: stata-users/dd_cont_vars.qmd

        - section: "Data Handling"
          contents:
            - text: "Recoding Categories"
              href: stata-users/dh_catg_vars.qmd
            - text: "Preparing Income Variables"
              href: stata-users/dh_inc_prep.qmd
            - text: "Currency and Price Level Adjustments"
              href: stata-users/dh_ppp.qmd

        - section: "Structuring Results for Analysis"
          contents:
          - text: "Export to CSV"
            href: stata-users/tidy_exp_to_csv.qmd
          - text: "Plotting in Stata"
            href: stata-users/tidy_plots.qmd      

    # -------------------------
    # Other Resources
    # -------------------------
    - id: other-resources
      title: "Other Resources"
      contents:
          href: other-resources/index.qmd


    # -------------------------
    # FAQs Sidebar
    # -------------------------
    - id: faqs
      title: "FAQs"
      contents:
          href: faqs/index.qmd


format:
  html:
    theme: [cosmo, custom.scss]
    css: styles.css

    toc: true
    toc-title: "On this page"
    toc-location: right
    toc-depth: 3
    toc-expand: true

    code-link: true
    callout-appearance: default
    include-after-body:
      - text: |
          <script src="/assets/foldable.js"></script>

editor: source

